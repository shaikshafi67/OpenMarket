<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>OpenMarket | Smart Trading</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">OpenMarket</a>
            <a href="/sell" class="btn btn-outline-light">Sell My Item</a>
        </div>
    </nav>

    <div class="bg-primary text-white text-center py-5">
        <h1>Welcome to OpenMarket</h1>
        <p>Buy and sell items verified by our community experts.</p>
    </div>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-4 mb-4" th:each="product : ${products}">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${product.title}">Product Name</h5>
                        <p class="card-text text-muted" th:text="${product.description}">Description...</p>
                        <h6 class="text-primary">$ <span th:text="${product.price}">0.00</span></h6>
                        <button class="btn btn-success w-100 mt-2">Buy Now</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
