name: CI/CD → GitHub + Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install & Build React client
        working-directory: ./client
        run: |
          npm ci
          CI=false npm run build

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci --production

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@openmarket.com"
          git config --global user.name "OpenMarket CI"

          # Clone HF Space
          git clone https://shafi16:${HF_TOKEN}@huggingface.co/spaces/shafi16/OpenMarket hf_space

          # Sync all files except git folders and node_modules
          rsync -a \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='client/node_modules' \
            --exclude='server/uploads' \
            ./ hf_space/

          cd hf_space
          git add -A
          git diff --staged --quiet || git commit -m "Deploy $(date +'%Y-%m-%d %H:%M:%S') from GitHub Actions"
          git push
